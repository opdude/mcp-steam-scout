version: '3'

tasks:
  build:
    desc: Build all binaries
    cmds:
      - go build -o bin/mcp-server ./cmd/mcp-server/main.go
      - go build -o bin/setup-xbox ./cmd/setup-xbox/main.go
      - go build -o bin/setup-psn ./cmd/setup-psn/main.go
      - go build -o bin/setup-epic ./cmd/setup-epic/main.go

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...

  tidy:
    desc: Tidy up go modules
    cmds:
      - go mod tidy

  lint:
    desc: Run golangci-lint
    cmds:
      - go tool golangci-lint run ./cmd/... ./internal/... ./pkg/...
