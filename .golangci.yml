version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/opdude/mcp-steam-scout

issues:
  exclude-rules:
    # Test files don't need to check every error
    - path: _test\.go
      linters:
        - errcheck
